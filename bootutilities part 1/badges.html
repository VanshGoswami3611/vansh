<!DOCTYPE html>
<html lang="en">

<head>
    <title>Badges</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width , initial-scale=1">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
</head>
<body>
    <div class="container">
        <h2>Contextual Badges</h2>
        <span class="badge badge-primary">Primary</span>
        <span class="badge badge-secondary">Primary</span>
        <span class="badge badge-success">Primary</span>
        <span class="badge badge-danger">Primary</span>
        <span class="badge badge-warning">Primary</span>
        <span class="badge badge-info">Primary</span>
        <span class="badge badge-light">Primary</span>
        <span class="badge badge-dark">Primary</span>
    </div>
</body>
</html>
