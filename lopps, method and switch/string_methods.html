<!DOCTYPE html>
<html>

<body>
    <h2>Javascript String Methods</h2>
    <p>Basic Methods</p>
    <script>
        var str = "AmAzInG" ;
        document.write(str.toUpperCase());
        document.write("<br>");
        document.write(str.toLowerCase());
        document.write("<br>");
        document.write(str.startsWith('I'));
        document.write("<br>");

            // Test Method -> returns true or flase 
            var strl = "I learnt about Metods" ;
            var patt = new RegExp("about");
            var res = patt.test(strl);
            document.write(res);
    </script>
</body>
</html>
