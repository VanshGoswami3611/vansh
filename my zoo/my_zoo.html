<!DOCTYPE html>
<html>

<head>
    <title>My Zoo</title>
    <style>
        body {
            font-family:Arial, Helvetica, sans-serif ;
            background:whitesmoke ;
            text-align:center;
            padding: 30px;
        }
        h1 {
            color: rgb(238, 7, 7);
        }
        #zoo {
            border: 2px solid red;
            width: 300px;
            margin: 16px auto;
            padding: 12px;
            border-radius: 10px;
            background: solid black;

        }
        .zone {
            border: 1px solid red;
            width: 6px 0;
            margin: 300px auto;
            padding: 8px 12px;
            border-radius: 6px;
            text-align: left;

        }

        button {
            background: red;
            color: blanchedalmond;
            padding: 10px 24px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h1>My Zoo</h1>
    <p>Use JavaScript and the Dom to add animal to each cagle</p>


    <!--
    Dom Tree: zoo is the parent element node.
    Zone divs are child element nodes. Animal names inside esch span are text nodes.
    -->
    <div id="zoo">
        <div class="zone">Zone 1:<span id="zone1"></span></div>
        <div class="zone">Zone 2:<span id="zone2"></span></div>
        <div class="zone">Zone 3:<span id="zone3"></span></div>
        <div class="zone">Total Animals: <span id="total"></span></div>
    </div>
    <br>
    <button onclick="openZoo()">Open the zoo!</button>
    <p id="zoo-status"></p>

    <script>
        function openZoo() {
            /* task 1: Add your first animal to zone 1 */
            document.getElementById("zone1").innerHTML = "Lion";
            /* Task 2: Add your second animal to zone 2 */document.getElementById("zone2").innerHTML = "Elephant"
            /* Task 3: Add your third animal to zone 3 */ 
                  
        }
    </script>
</body>
</html>
